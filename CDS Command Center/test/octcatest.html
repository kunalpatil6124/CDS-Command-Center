<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Quiz Test</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #1a472a 100%);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #2d5a3d 0%, #3d7a4f 100%);
            color: #e8d5c4;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 3px solid #8b9a6e;
        }

        .header-title {
            font-size: 24px;
            font-weight: bold;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .timer-container.warning {
            background: rgba(255,76,76,0.4);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Progress Bar */
        .progress-section {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a7c59 0%, #6ba876 100%);
            transition: width 0.3s ease;
        }

        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Question Panel */
        .question-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
            background: white;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #4a7c59;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Options */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #f0ebe5;
            border-color: #4a7c59;
        }

        .option.selected {
            background: #4a7c59;
            color: #e8d5c4;
            border-color: #4a7c59;
        }

        .option-label {
            font-weight: 600;
            min-width: 30px;
        }

        .option-text {
            flex: 1;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a7c59 0%, #6ba876 100%);
            color: #e8d5c4;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 124, 89, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e8e8e8;
            border-color: #667eea;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: #e8d5c4;
            grid-column: 1 / -1;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 69, 19, 0.4);
        }

        /* Question Palette (Grid) */
        .palette-section {
            width: 250px;
            background: #f8f9fa;
            border-left: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .palette-section.show {
            display: flex;
            flex-direction: column;
        }

        .palette-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .palette-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            background: white;
            transition: all 0.3s ease;
            color: #666;
        }

        .palette-item:hover {
            border-color: #4a7c59;
            background: #f0ebe5;
        }

        .palette-item.attempted {
            background: #4a7c59;
            color: #e8d5c4;
            border-color: #4a7c59;
        }

        .palette-item.unattempted {
            background: #fff3e0;
            border-color: #ff6b00;
            color: #666;
        }

        .palette-item.current {
            border: 3px solid #8b4513;
            background: #faf3f0;
        }

        /* Result Screen */
        .result-screen {
            display: none;
            flex-direction: column;
            padding: 30px;
            background: white;
            overflow-y: auto;
        }

        .result-screen.show {
            display: flex;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            color: #4a7c59;
            margin-bottom: 30px;
            text-align: center;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
        }

        .result-card {
            background: linear-gradient(135deg, #2d5a3d 0%, #4a7c59 100%);
            color: #e8d5c4;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .result-card-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-card-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .result-percentage {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4a7c59;
            text-align: center;
        }

        .result-btn {
            background: linear-gradient(135deg, #4a7c59 0%, #6ba876 100%);
            color: #e8d5c4;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
            align-self: center;
        }

        .result-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 124, 89, 0.4);
        }

        .report-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .report-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #4a7c59;
            color: #e8d5c4;
            border-color: #4a7c59;
        }

        .filter-btn:hover {
            border-color: #4a7c59;
        }

        .question-review {
            background: #f8f9fa;
            border-left: 4px solid #4a7c59;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .question-review.wrong {
            border-left-color: #ff6b00;
        }

        .question-review.unattempted {
            border-left-color: #cccccc;
            opacity: 0.7;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .review-question-num {
            font-size: 14px;
            font-weight: bold;
            color: #4a7c59;
        }

        .review-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .review-status.correct {
            background: #d4edda;
            color: #155724;
        }

        .review-status.wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .review-status.unattempted {
            background: #e2e3e5;
            color: #383d41;
        }

        .review-question-text {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .review-answers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .review-answer-box {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: white;
            font-size: 14px;
        }

        .review-answer-box.selected-answer {
            background: #fff3e0;
            border-color: #ff6b00;
            font-weight: 600;
        }

        .review-answer-box.correct-answer {
            background: #d4edda;
            border-color: #155724;
            font-weight: 600;
        }

        .review-answer-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .palette-section {
                width: 180px;
                padding: 15px;
            }

            .palette-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .question-panel {
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .palette-section {
                width: 100%;
                border-left: none;
                border-top: 1px solid #e0e0e0;
                max-height: 250px;
                padding: 15px;
            }

            .palette-grid {
                grid-template-columns: repeat(5, 1fr);
            }

            .question-panel {
                padding: 15px;
            }

            .question-text {
                font-size: 16px;
                margin-bottom: 20px;
            }

            .option {
                padding: 12px 15px;
                font-size: 14px;
            }

            .header {
                padding: 15px;
                flex-direction: column;
                text-align: center;
            }

            .header-title {
                font-size: 20px;
            }

            .nav-buttons {
                gap: 8px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
                min-width: 100px;
            }

            .result-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .result-title {
                font-size: 24px;
            }

            .result-card-value {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 12px;
            }

            .header-title {
                font-size: 18px;
            }

            .timer-container {
                font-size: 14px;
                padding: 8px 12px;
            }

            .question-panel {
                padding: 12px;
            }

            .question-number {
                font-size: 14px;
            }

            .question-text {
                font-size: 15px;
            }

            .option {
                padding: 10px 12px;
                font-size: 13px;
                gap: 8px;
            }

            .palette-grid {
                grid-template-columns: repeat(6, 1fr);
            }

            .nav-buttons {
                flex-direction: column;
            }

            .btn {
                flex: 1;
                min-width: auto;
                font-size: 13px;
                padding: 10px 12px;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .result-card {
                padding: 15px;
            }

            .result-card-value {
                font-size: 24px;
            }
        }

        /* Scrollbar Styling */
        .question-panel::-webkit-scrollbar,
        .palette-section::-webkit-scrollbar,
        .result-screen::-webkit-scrollbar {
            width: 6px;
        }

        .question-panel::-webkit-scrollbar-track,
        .palette-section::-webkit-scrollbar-track,
        .result-screen::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .question-panel::-webkit-scrollbar-thumb,
        .palette-section::-webkit-scrollbar-thumb,
        .result-screen::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .question-panel::-webkit-scrollbar-thumb:hover,
        .palette-section::-webkit-scrollbar-thumb:hover,
        .result-screen::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>

 <body>
  <div class="container">
   <!-- Header -->
   <div class="header">
    <div>
     <a href="../index.html" style="display: inline-flex; align-items: center; gap: 8px; color: #e8d5c4; text-decoration: none; font-weight: 600; padding: 8px 16px; background: rgba(255,255,255,0.1); border-radius: 6px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">

     </a>
    </div>
    <div class="header-title">

   </div><!-- Progress Bar -->
   <div class="progress-section">

     <span>Progress: <span id="progressText">0/100</span></span> <span id="questionStatus">Question 1 of 100</span>
    </div>
    <div class="progress-bar">
     <div class="progress-fill" id="progressBar"></div>
    </div>
   </div><!-- Main Content -->
   <div class="main-content">
    <!-- Question Panel -->
    <div class="question-panel">
     <div class="question-header">
      <div class="question-number" id="questionNum">
       Question 1
      </div>
     </div>
     <div class="question-text" id="questionText"></div>
     <div class="options-container" id="optionsContainer"></div>
     <div class="nav-buttons">
      <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Previous</button> <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next →</button> <button class="btn btn-submit" id="submitBtn" onclick="showSubmitConfirm()" style="display: none;">Submit Test</button>
     </div>
    </div><!-- Question Palette -->
    <div class="palette-section" id="paletteSection">
     <div class="palette-title">
      Questions
     </div>

    </div><!-- Result Screen -->
    <div class="result-screen" id="resultScreen">
     <div class="result-title">
      Test Completed!
     </div>
     <div class="result-grid">
      <div class="result-card">
       <div class="result-card-value" id="totalQuestions">
        100
       </div>
       <div class="result-card-label">
        Total Questions
       </div>
      </div>
      <div class="result-card">
       <div class="result-card-value" id="attemptedQuestions">
        0
       </div>
       <div class="result-card-label">
        Attempted
       </div>
      </div>
      <div class="result-card">
       <div class="result-card-value" id="correctAnswers">
        0
       </div>
       <div class="result-card-label">
        Correct Answers
       </div>
      </div>
      <div class="result-card">
       <div class="result-card-value" id="scorePercentage">
        0%
       </div>
       <div class="result-card-label">
        Score
       </div>
      </div>
     </div>
     <div class="report-section">
      <div class="report-title">
       Detailed Question Review
      </div>
      <div class="filter-buttons"><button class="filter-btn active" data-filter="all" onclick="filterReport('all')">All Questions</button> <button class="filter-btn" data-filter="correct" onclick="filterReport('correct')">✓ Correct</button> <button class="filter-btn" data-filter="wrong" onclick="filterReport('wrong')">✗ Wrong</button> <button class="filter-btn" data-filter="unattempted" onclick="filterReport('unattempted')">○ Unattempted</button>
      </div>
      <div id="reportContainer"></div>
     </div><button class="result-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>
   </div>

  <script>
        // Quiz Data
        const quizData = [
            {
                id: 1,
                question: "Consider the following statements:\n1. Balod district in Chhattisgarh has been declared India's first child marriage-free district.\n2. India's first private sector helicopter Final Assembly Line for Airbus H125 helicopters will be set up in Karnataka.\n3. The facility will be developed by Tata Advanced Systems Limited in partnership with Airbus.\nWhich of the statements given above is/are correct?",
                options: ["1 only", "1 and 2 only", "2 and 3 only", "1, 2 and 3"],
                correct: 3
            },
            {
                id: 2,
                question: "India's first private-sector helicopter Final Assembly Line for Airbus H125 helicopters will be established at:",
                options: ["Vemagal", "Hosur", "Belagavi", "Nagpur"],
                correct: 0
            },
            {
                id: 3,
                question: "Consider the following statements regarding digital bonds:\n1. Maharashtra adopted the E-Bond system for issuing municipal bonds.\n2. Maharashtra became the first Indian state to adopt digital bonds.\n3. The initiative aims to improve transparency in municipal financing.\nWhich of the statements given above is/are correct?",
                options: ["1 and 3 only", "2 and 3 only", "1 and 2 only", "1, 2 and 3"],
                correct: 0
            },
            {
                id: 4,
                question: "Which organization launched the \"Saksham\" Counter-Unmanned Aerial System Grid System?",
                options: ["DRDO", "Indian Army", "Bharat Electronics Limited", "ISRO"],
                correct: 1
            },
            {
                id: 5,
                question: "Consider the following statements regarding India's semiconductor ecosystem:\n1. India Semiconductor Mission was launched to strengthen domestic semiconductor manufacturing.\n2. The mission operates under the Ministry of Electronics and Information Technology.\n3. Its aim includes developing semiconductor fabrication units in India.\nWhich of the statements given above is/are correct?",
                options: ["1 and 2 only", "2 and 3 only", "1 and 3 only", "1, 2 and 3"],
                correct: 3
            },
            {
                id: 6,
                question: "Which ministry launched the India Semiconductor Mission?",
                options: ["Ministry of Finance", "Ministry of Electronics and Information Technology", "Ministry of Science and Technology", "Ministry of Commerce"],
                correct: 1
            },
            {
                id: 7,
                question: "Consider the following statements:\n1. India has launched initiatives to promote green hydrogen under the National Green Hydrogen Mission.\n2. The mission aims to make India a global hub for green hydrogen production.\n3. The mission is implemented by the Ministry of Petroleum and Natural Gas.\nWhich of the statements given above is/are correct?",
                options: ["1 and 2 only", "2 and 3 only", "1 and 3 only", "1, 2 and 3"],
                correct: 0
            },
            {
                id: 8,
                question: "The National Green Hydrogen Mission was launched in:",
                options: ["2021", "2022", "2023", "2024"],
                correct: 2
            },
            {
                id: 9,
                question: "Consider the following statements regarding India's digital infrastructure:\n1. India Stack is a set of open APIs that enables digital identity and financial services.\n2. Aadhaar forms the foundation of India Stack.\n3. India Stack is managed by the Ministry of Finance.\nWhich of the statements given above is/are correct?",
                options: ["1 and 2 only", "2 and 3 only", "1 and 3 only", "1, 2 and 3"],
                correct: 0
            },
            {
                id: 10,
                question: "Which institution issues Aadhaar numbers in India?",
                options: ["Reserve Bank of India", "Unique Identification Authority of India", "NITI Aayog", "Ministry of Finance"],
                correct: 1
            },
            {
                id: 11,
                question: "Consider the following statements regarding Project Himank:\n1. Project Himank is implemented by the Border Roads Organisation.\n2. It focuses on developing infrastructure in Ladakh.\n3. The project created the world's highest motorable road at Umling La.\nWhich of the statements given above is/are correct?",
                options: ["1 and 2 only", "2 and 3 only", "1 and 3 only", "1, 2 and 3"],
                correct: 3
            },
            {
                id: 12,
                question: "The Border Roads Organisation operates under:",
                options: ["Ministry of Defence", "Ministry of Home Affairs", "Ministry of Road Transport", "Ministry of Infrastructure"],
                correct: 0
            },
            {
                id: 13,
                question: "Consider the following statements regarding India's space sector reforms:\n1. IN-SPACe was established to promote private sector participation in space activities.\n2. IN-SPACe functions under the Department of Space.\n3. It regulates and facilitates private space companies.\nWhich of the statements given above is/are correct?",
                options: ["1 and 2 only", "2 and 3 only", "1 and 3 only", "1, 2 and 3"],
                correct: 3
            },
            {
                id: 14,
                question: "IN-SPACe headquarters is located in:",
                options: ["Bengaluru", "Ahmedabad", "Sriharikota", "Hyderabad"],
                correct: 1
            },

            const attemptedCount = answers.filter(a => a !== null).length;
            document.getElementById('progressText').textContent = `${attemptedCount}/100`;
            document.getElementById('progressBar').style.width = ((currentQuestion + 1) / 100 * 100) + '%';

            // Render options
            renderOptions(question);

            // Update button states
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            const isLastQuestion = currentQuestion === 99;
            document.getElementById('nextBtn').style.display = isLastQuestion ? 'none' : 'block';
            document.getElementById('submitBtn').style.display = isLastQuestion ? 'block' : 'none';

            // Update palette
            updatePaletteHighlight();
        }

        // Render Options
        function renderOptions(question) {
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const labels = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                optionDiv.innerHTML = `<span class="option-label">${labels[index]}.</span><span class="option-text">${option}</span>`;
                optionDiv.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(optionDiv);
            });
        }

        // Select Answer
        function selectAnswer(index) {
            answers[currentQuestion] = index;
            renderOptions(quizData[currentQuestion]);
            updatePaletteHighlight();
        }

        // Navigate to Next Question
        function nextQuestion() {
            if (currentQuestion < 99) {
                currentQuestion++;
                loadQuestion();
                document.querySelector('.question-panel').scrollTop = 0;
            }
        }

        // Navigate to Previous Question
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
                document.querySelector('.question-panel').scrollTop = 0;
            }
        }

        // Jump to Question from Palette
        function jumpToQuestion(index) {
            currentQuestion = index;
            loadQuestion();
            document.querySelector('.question-panel').scrollTop = 0;
        }

        // Render Question Palette
        function renderPalette() {
            const paletteGrid = document.getElementById('paletteGrid');
            paletteGrid.innerHTML = '';
            
            for (let i = 0; i < 100; i++) {
                const paletteItem = document.createElement('div');
                paletteItem.className = 'palette-item';
                paletteItem.textContent = i + 1;
                
                if (i === currentQuestion) {
                    paletteItem.classList.add('current');
                }
                if (answers[i] !== null) {
                    paletteItem.classList.add('attempted');
                } else {
                    paletteItem.classList.add('unattempted');
                }
                
                paletteItem.onclick = () => jumpToQuestion(i);
                paletteGrid.appendChild(paletteItem);
            }

            document.getElementById('paletteSection').classList.add('show');
        }

        // Update Palette Highlight
        function updatePaletteHighlight() {
            const items = document.querySelectorAll('.palette-item');
            items.forEach((item, index) => {
                item.classList.remove('current');
                if (index === currentQuestion) {
                    item.classList.add('current');
                }
            });
        }

        // Timer Logic
        function startTimer() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                }
            }, 1000);
        }

        // Update Timer Display
        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            const timerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').textContent = timerText;

            const timerContainer = document.getElementById('timerContainer');
            if (timeRemaining <= 300) { // 5 minutes
                timerContainer.classList.add('warning');
            } else {
                timerContainer.classList.remove('warning');
            }
        }

        // Show Submit Confirmation
        function showSubmitConfirm() {
            const unattempted = 100 - answers.filter(a => a !== null).length;
            const confirmDiv = document.createElement('div');
            confirmDiv.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                background: white;
                padding: 30px;
                border-radius: 10px;
                max-width: 400px;
                text-align: center;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            `;
            
            modal.innerHTML = `
                <h3 style="font-size: 20px; font-weight: bold; color: #333; margin-bottom: 15px;">Confirm Submission</h3>
                <p style="font-size: 14px; color: #666; margin-bottom: 10px;">
                    You have attempted <strong>${100 - unattempted}</strong> questions.
                </p>
                <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
                    ${unattempted > 0 ? `<strong>${unattempted}</strong> questions are unattempted.` : 'All questions have been attempted.'}
                </p>
                <div style="display: flex; gap: 10px;">
                    <button onclick="this.closest('div').remove()" style="flex: 1; padding: 10px 20px; border: 2px solid #e0e0e0; background: white; color: #333; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s;">Cancel</button>
                    <button onclick="submitQuiz(); this.closest('div').remove();" style="flex: 1; padding: 10px 20px; background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%); color: #e8d5c4; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s;">Submit</button>
                </div>
            `;
            
            modal.addEventListener('click', (e) => e.stopPropagation());
            confirmDiv.appendChild(modal);
            confirmDiv.addEventListener('click', () => confirmDiv.remove());
            document.body.appendChild(confirmDiv);
        }

        // Submit Quiz
        function submitQuiz() {
            quizSubmitted = true;
            clearInterval(timerInterval);

            // Calculate results
            let correct = 0;
            answers.forEach((answer, index) => {
                if (answer !== null && answer === quizData[index].correct) {
                    correct++;
                }
            });

            const attempted = answers.filter(a => a !== null).length;
            const unattempted = 100 - attempted;
            const percentage = Math.round((correct / 100) * 100);

            // Update summary cards
            document.getElementById('totalQuestions').textContent = '100';
            document.getElementById('attemptedQuestions').textContent = attempted;
            document.getElementById('correctAnswers').textContent = correct;
            document.getElementById('scorePercentage').textContent = percentage + '%';

            // Generate detailed report
            generateReport();

            // Show result screen
            document.querySelector('.question-panel').style.display = 'none';
            document.querySelector('.palette-section').style.display = 'none';
            document.getElementById('resultScreen').classList.add('show');
        }

        // Generate Detailed Report
        function generateReport() {
            const reportContainer = document.getElementById('reportContainer');
            reportContainer.innerHTML = '';

            let allQuestions = [];
            
            for (let i = 0; i < 100; i++) {
                const question = quizData[i];
                const answer = answers[i];
                let status;

                if (answer === null) {
                    status = 'unattempted';
                } else if (answer === question.correct) {
                    status = 'correct';
                } else {
                    status = 'wrong';
                }

                allQuestions.push({
                    index: i,
                    question: question,
                    answer: answer,
                    status: status
                });
            }

            // Filter based on current filter
            let filteredQuestions = allQuestions;
            if (currentFilter !== 'all') {
                filteredQuestions = allQuestions.filter(q => q.status === currentFilter);
            }

            // Display questions
            filteredQuestions.forEach(q => {
                const questionReview = document.createElement('div');
                questionReview.className = `question-review ${q.status}`;
                
                const labels = ['A', 'B', 'C', 'D'];
                let reviewHTML = `
                    <div class="review-header">
                        <div class="review-question-num">Question ${q.index + 1}</div>
                        <span class="review-status ${q.status}">
                            ${q.status === 'correct' ? '✓ Correct' : q.status === 'wrong' ? '✗ Wrong' : '○ Unattempted'}
                        </span>
                    </div>
                    <div class="review-question-text">${q.question.question}</div>
                    <div class="review-answers">
                `;

                q.question.options.forEach((option, idx) => {
                    let answerClass = '';
                    let answerLabel = '';

                    if (q.status === 'unattempted') {
                        if (idx === q.question.correct) {
                            answerClass = 'correct-answer';
                            answerLabel = 'Correct Answer';
                        }
                    } else {
                        if (idx === q.answer) {
                            answerClass = 'selected-answer';
                            answerLabel = 'Your Answer';
                        }
                        if (idx === q.question.correct && q.status === 'wrong') {
                            answerClass = 'correct-answer';
                            answerLabel = 'Correct Answer';
                        }
                    }

                    if (answerClass) {
                        reviewHTML += `
                            <div class="review-answer-box ${answerClass}">
                                <div class="review-answer-label">${answerLabel}</div>
                                <strong>${labels[idx]}.</strong> ${option}
                            </div>
                        `;
                    }
                });

                reviewHTML += '</div>';
                questionReview.innerHTML = reviewHTML;
                reportContainer.appendChild(questionReview);
            });

            if (filteredQuestions.length === 0) {
                reportContainer.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No questions found for this filter.</p>';
            }
        }

        // Filter Report
        function filterReport(filter) {
            currentFilter = filter;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

            // Regenerate report
            generateReport();
        }

        // Restart Quiz
        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(100).fill(null);
            timeRemaining = 100 * 60;
            quizSubmitted = false;
            currentFilter = 'all';
            document.getElementById('resultScreen').classList.remove('show');
            document.querySelector('.question-panel').style.display = 'flex';
            document.querySelector('.palette-section').style.display = 'none';
            
            loadQuestion();
            renderPalette();
            startTimer();
        }

        // Initialize on Load
        window.addEventListener('DOMContentLoaded', initQuiz);
    </script>
